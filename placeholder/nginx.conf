server {
    listen 80 default_server;
    server_name _;
    default_type text/html;

    location / {
        return 200 "<!DOCTYPE html><html><head><meta charset=\"utf-8\"><title>Stub</title><style>body{font-family:system-ui;margin:2rem;line-height:1.5}code{background:#eee;padding:0.1em 0.3em}</style></head><body><h1>Placeholder</h1><p><strong>Host:</strong> $host</p><p>This project has a stub route only. Add a real container in <code>docker-compose.apps.yml</code> using the same service name as the catalog <code>id</code>; it will be excluded from stubs automatically.</p></body></html>";
    }
}
