server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    add_header Content-Security-Policy "frame-ancestors *" always;

    # `try_files $uri $uri/ …` on `/` can yield 403 if the doc root is an empty directory (directory
    # index missing before the /index.html fallback). MkDocs and SPA builds always use index.html at /.
    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
